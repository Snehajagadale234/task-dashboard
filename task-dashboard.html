<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

header {
    background: #4CAF50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 80%;
    margin: auto;
    margin-top: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

button {
    cursor: pointer;
}

.task {
    background: white;
    padding: 10px;
    margin: 8px 0;
    border-left: 5px solid #4CAF50;
    display: flex;
    justify-content: space-between;
}

.overdue {
    border-left: 5px solid red;
    background: #ffe6e6;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.stats {
    background: white;
    padding: 10px;
    margin-top: 20px;
}

.quote {
    background: #fff3cd;
    padding: 10px;
    margin-top: 20px;
    text-align: center;
    font-style: italic;
}
</style>
</head>

<body>

<header>
    <h1>Task Management Dashboard</h1>
</header>

<div class="container">

    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="date" id="dueDate">
    <button onclick="addTask()">Add Task</button>

    <div id="taskList"></div>

    <div class="stats">
        <h3>Statistics</h3>
        <p>Total Tasks: <span id="total">0</span></p>
        <p>Completed: <span id="completed">0</span></p>
        <p>Pending: <span id="pending">0</span></p>
    </div>

    <div class="quote" id="quote"></div>

</div>

<script>
let tasks = [];

const quotes = [
    "Stay focused and never give up.",
    "Small steps lead to big success.",
    "Believe in yourself!",
    "Push yourself, no one else will.",
    "Success is built on consistency."
];

function showQuote() {
    document.getElementById("quote").innerText =
        quotes[Math.floor(Math.random() * quotes.length)];
}

function addTask() {
    const text = document.getElementById("taskInput").value;
    const date = document.getElementById("dueDate").value;

    if (text === "") return alert("Enter task!");

    tasks.push({
        text,
        date,
        completed: false
    });

    document.getElementById("taskInput").value = "";
    document.getElementById("dueDate").value = "";

    renderTasks();
}

function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    renderTasks();
}

function editTask(index) {
    const newText = prompt("Edit task:", tasks[index].text);
    if (newText) {
        tasks[index].text = newText;
        renderTasks();
    }
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let total = tasks.length;
    let completed = 0;

    tasks.forEach((task, index) => {
        const div = document.createElement("div");
        div.className = "task";

        const today = new Date().toISOString().split("T")[0];

        if (task.date && task.date < today && !task.completed) {
            div.classList.add("overdue");
        }

        if (task.completed) {
            div.classList.add("completed");
            completed++;
        }

        div.innerHTML = `
            <span>${task.text} (${task.date || "No Date"})</span>
            <div>
                <button onclick="toggleTask(${index})">✔</button>
                <button onclick="editTask(${index})">✎</button>
            </div>
        `;

        list.appendChild(div);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("completed").innerText = completed;
    document.getElementById("pending").innerText = total - completed;
}

// Initial
showQuote();
</script>

</body>
</html>
